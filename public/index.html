        function showMessage(message, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `fixed top-4 right-4 p-4 rounded-lg z-50 ${
                type === 'success' ? 'bg-green-500' : 
                type === 'error' ? 'bg-red-500' : 'bg-blue-500'
            } text-white`;
            messageDiv.textContent = message;
            document.body.appendChild(messageDiv);
            
            setTimeout(() => {
                document.body.removeChild(messageDiv);
            }, 3000);
        }

        // API Calls
        async function apiCall(endpoint, method = 'GET', data = null) {
            try {
                const config = {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };

                if (authToken) {
                    config.headers['Authorization'] = `Bearer ${authToken}`;
                }

                if (data) {
                    config.body = JSON.stringify(data);
                }

                const response = await fetch(`${API_URL}${endpoint}`, config);
                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || 'Napaka pri komunikaciji s strežnikom');
                }

                return result;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        // Authentication
        async function login(username, password) {
            try {
                const result = await apiCall('/login', 'POST', { username, password });
                
                if (result.success) {
                    authToken = result.token;
                    localStorage.setItem('authToken', authToken);
                    currentUser = result.user;
                    appState.isLoggedIn = true;
                    appState.isAdmin = result.user.isAdmin;
                    
                    if (result.user.isAdmin) {
                        showScreen('admin');
                        loadAdminData();
                    } else {
                        appState.userAccount = result.user;
                        showScreen('dashboard');
                    }
                    
                    showMessage('Prijava uspešna!', 'success');
                }
            } catch (error) {
    // Traduire les messages d'erreur
    let errorMsg = error.message;
    if (errorMsg.includes('Napačni') || errorMsg.includes('Invalid')) {
        errorMsg = getPageText('wrongCredentials');
    } else if (errorMsg.includes('čaka') || errorMsg.includes('pending')) {
        errorMsg = getPageText('accountPendingMsg');
    } else if (errorMsg.includes('blokiran') || errorMsg.includes('blocked')) {
        errorMsg = getPageText('accountBlocked');
    }
    showMessage(errorMsg, 'error');
}
        }

            event.preventDefault();

    return;

        }

        function closeAccountModal() {
            document.getElementById('accountModal').classList.add('hidden');
            currentEditingAccountId = null;
        }

        function saveAccount() {
            const newAccount = document.getElementById('newAccountInput').value;
            if (currentEditingAccountId && newAccount) {
                updateAccountNumber(currentEditingAccountId, newAccount);
                closeAccountModal();
            }
        }
        
        // Fonction pour mettre à jour le nom du fichier
        function updateFileName(input) {
            const fileName = document.getElementById('fileName');
            if (input.files && input.files[0]) {
                fileName.textContent = input.files[0].name;
                fileName.classList.remove('text-gray-500');
                fileName.classList.add('text-gray-800');
            } else {
                fileName.textContent = 'Izberite datoteko...';
                fileName.classList.remove('text-gray-800');
                fileName.classList.add('text-gray-500');
            }
        }
        
        // Main render function
        function renderCurrentScreen() {
            const app = document.getElementById('app');
            
            switch (appState.currentScreen) {
                case 'home':
                    app.innerHTML = renderHomeScreen();
                    break;
                case 'login':
                    app.innerHTML = renderLoginScreen();
                    break;
                case 'register':
                    app.innerHTML = renderRegisterScreen();
                    break;
                case 'dashboard':
                    app.innerHTML = renderDashboardScreen();
                    break;
                case 'admin':
                    app.innerHTML = renderAdminScreen();
                    break;
                case 'waiting':
                    app.innerHTML = renderWaitingScreen();
                    break;
                case 'contact':
                    app.innerHTML = renderContactScreen();
                    break;
                default:
                    app.innerHTML = renderHomeScreen();
            }
        }

        // Auto login check
        async function checkAutoLogin() {
            if (authToken) {
                try {
                    const result = await apiCall('/user/profile');
                    if (result.success) {
                        currentUser = result.user;
                        appState.isLoggedIn = true;
                        appState.isAdmin = result.user.isAdmin;
                        
                        if (result.user.isAdmin) {
                            showScreen('admin');
                            loadAdminData();
                        } else {
                            appState.userAccount = result.user;
                            showScreen('dashboard');
                        }
                        return;
                    }
                } catch (error) {
                    console.log('Auto login failed');
                    localStorage.removeItem('authToken');
                    authToken = null;
                }
            }
            showScreen('home');
        }

        // Initialize app
        function initApp() {
            // Image carousel
            setInterval(() => {
                appState.currentImageIndex = (appState.currentImageIndex + 1) % bankImages.length;
                if (appState.currentScreen === 'home') {
                    const scrollingText = document.getElementById('scrollingText');
                    const imageCarousel = document.getElementById('imageCarousel');
                    if (scrollingText) {
                        scrollingText.textContent = scrollingTexts[appState.currentImageIndex];
                    }
                    if (imageCarousel) {
                        renderCurrentScreen();
                    }
                }
            }, 3000);

            // Check auto login
            checkAutoLogin();
        }

        // Start app when page loads
        window.addEventListener('load', () => {
            document.getElementById('loading').style.display = 'none';
            initApp();
        });
    </script>
</body>
</html>
